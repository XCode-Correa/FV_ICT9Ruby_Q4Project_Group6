<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-size: cover;
            background-repeat: repeat;
            background-position: center;
            background-attachment: fixed;
            background-color: rgb(34, 34, 34);
            display: flex;
            justify-content: center; 
            align-items: center;     
            height: 100vh; 
        }
        img{
            height: 60px;
            width: 60px;
        }
        .fs-7{
            font-size: 14px;
        }
        .fs-8{
            font-size: 15px;
        }
        .fs-9{
            font-size: 12px;
        }
        .fs-attempt{
            font-size: 12px;
        }
        .pt-6 {
            padding-top: 65px;
        }
    </style>
</head>
<body>

<div style="background-color: rgba(255, 255, 255, 0.5); width: 400px; border-radius: 30px;" class="container text-dark p-3">
    <br>

    <center>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRGDizIH8HMP5y6qTldEpO8VZEd6X0UiSrYFw&s" alt="Logo" style="width: 100px; height: auto;">
    </center>

    <br>
    
    <div class="text-center">
        <h1 class="fw-bold">Login</h1>
    </div>

    <div class="text-center">
        <label class="form-label fs-9 fw-bold bg-dark text-light p-1 my-1" style="border-radius: 20px;" for="username">Username</label>
	    <input type="text" id="username" class="form-control form-control-sm rounded-pill text-center" name="username" placeholder="Enter here" required>
    </div>

    <br>

    <div class="text-center">
        <label class="form-label fs-9 fw-bold bg-dark text-light p-1 my-1" style="border-radius: 20px;" for="password">Password</label>
	    <input type="password" id="password" class="form-control form-control-sm rounded-pill text-center" name="password" placeholder="*****" required>
    </div>

    <br>

    <div class="form-check d-flex align-items-center ps-0">
        <input type="checkbox" id="stay" class="form-check-input m-0 me-2" onchange="checkstay()">
        <label class="form-check-label fs-8 fw-bold" for="stay">Stay logged in.</label>
    </div>
    
    <p id="msg" class="fs-7 text-light" style="height: 10px; padding-left: 25px;"></p>

    <p id="display" style="height: 10px;" class="text-danger fs-attempt text-center"></p>

    <div class="text-center">
        <button style="width: 100px;" type="button" id="loginBTN" name="submit" class="btn btn-dark rounded-pill" onclick="login()">Login</button>

        <a href="index.html"><button style="width: 100px;" type="button" id="submit" name="submit" class="btn btn-light rounded-pill">Cancel</button></a>
    </div>

    <div class="text-center">
        <hr class="w-100 mx-auto text-dark"> 
        <a href="forgot.html" class="text-light fs-8 text-decoration-underline">Forgot username / password?</a>
    </div>
</div>

<script>
    let attempt_counter = 0;
    
    function login(){
        let username = document.getElementById("username").value;
        let password = document.getElementById("password").value;
        
        let correctuser = "RennSantosph"; // set username
        let correctpass = "1234"; // set password
        
        let granted = "Welcome " + username + "!";
        let denied = "Access denied. Account locked after 3 attempts!";
    
    while (attempt_counter < 3) {
        if (username === correctuser && password === correctpass) {
            alert(granted);
            attempt_counter = 0; // reset attempts after successful login
            document.getElementById("display").innerHTML = "";
            window.location.href = "dashboard.html";

            break; // stop loop
        }

        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }

        }
        if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true; // disable button
            }
        }
    
    function checkstay() {
        let isChecked = document.getElementById("stay").checked; 

        switch(isChecked) {
            case true:
                document.getElementById("msg").innerHTML = "<i>Your session will stay active in this device.</i>";
            break;

            case false:
                document.getElementById("msg").innerHTML = "";
            break;
        }
    }

</script>
</body>
</html>
